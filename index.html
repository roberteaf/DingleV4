<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Files - Google Drive</title>
    <style>
        /* RESET & CRITICAL PERFORMANCE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #00050a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* GPU ACCELERATED OCEAN BACKGROUND */
        #ocean-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* ULTRA-LIGHT GUI */
        #app-root { position: relative; z-index: 10; display: flex; flex-direction: column; width: 100%; height: 100%; }
        
        header {
            height: 65px; background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; padding: 0 15px; gap: 10px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .logo { color: #00f2ff; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }

        #search-form { flex: 1; display: flex; background: rgba(255,255,255,0.08); border-radius: 12px; padding: 4px 8px; border: 1px solid rgba(255,255,255,0.1); }
        #url-input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; padding: 8px; outline: none; }
        #url-input::placeholder { color: rgba(255,255,255,0.4); }

        .btn { background: #00f2ff; color: #000; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        /* THE ENGINE ROOM */
        #viewport-container { flex: 1; background: #fff; position: relative; overflow: hidden; }
        #main-view { width: 100%; height: 100%; border: none; display: block; }

        /* LOADING SPINNER */
        #loader { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #00f2ff;
            border-radius: 50%; animation: spin 1s linear infinite; display: none;
        }

        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* STEALTH TRIGGER ZONES (150px Square) */
        .trigger { position: fixed; bottom: 0; width: 150px; height: 150px; z-index: 999999; background: transparent; }
        #t-kill { left: 0; } 
        #t-hide { right: 0; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 600px) { .logo { display: none; } header { height: 60px; } }
    </style>
</head>
<body>

    <canvas id="ocean-canvas"></canvas>

    <div id="app-root">
        <header id="ui-header">
            <div class="logo">Abyssal V90</div>
            <form id="search-form">
                <input type="text" id="url-input" placeholder="Search or Enter URL (e.g. now.gg/play/roblox)..." autocomplete="off">
                <button type="submit" class="btn">GO</button>
            </form>
        </header>

        <div id="viewport-container">
            <div id="loader"></div>
            <iframe id="main-view" src="about:blank"></iframe>
        </div>
    </div>

    <div id="t-kill" class="trigger"></div>
    <div id="t-hide" class="trigger"></div>

    <script>
        /* 1. GPU OCEAN ENGINE (RAM EFFICIENT) */
        const canvas = document.getElementById('ocean-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<40; i++) particles.push({
                x: Math.random() * w, y: h + Math.random() * 100,
                s: Math.random() * 2 + 1, v: Math.random() * 1 + 0.5
            });
        }

        function draw() {
            ctx.fillStyle = '#020b1a';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = 'rgba(0, 242, 255, 0.15)';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.v;
                if(p.y < -10) p.y = h + 10;
            });
            requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();

        /* 2. THE BYPASS LOGIC */
        const form = document.getElementById('search-form');
        const inp = document.getElementById('url-input');
        const frame = document.getElementById('main-view');
        const loader = document.getElementById('loader');

        form.onsubmit = (e) => {
            e.preventDefault();
            let val = inp.value.trim();
            if(!val) return;

            loader.style.display = 'block';
            
            // Logic: Is it a URL?
            let target = (val.indexOf('.') > -1 && val.indexOf(' ') === -1) 
                ? (val.indexOf('http') === 0 ? val : 'https://' + val) 
                : 'https://duckduckgo.com/lite/?q=' + encodeURIComponent(val);

            // THE RAM FIX: Direct Proxy Navigation
            // Jamf Trust blocks "blob" and "data" URLs, but usually allows 
            // "allorigins" or "codetabs" because they are dev tools.
            frame.src = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(target);
        };

        frame.onload = () => { loader.style.display = 'none'; };

        /* 3. STEALTH TRIGGERS */
        // BOTTOM LEFT: KILL (Instant Google Redirect)
        document.getElementById('t-kill').onclick = () => {
            window.location.replace("https://www.google.com/search?q=educational+resources+for+students");
        };

        // BOTTOM RIGHT: HIDE (Toggle UI for Fullscreen Gaming)
        document.getElementById('t-hide').onclick = () => {
            const header = document.getElementById('ui-header');
            header.style.display = (header.style.display === 'none') ? 'flex' : 'none';
        };

        /* 4. ROBLOX OPTIMIZATION */
        // If user types 'roblox', we suggest now.gg automatically
        inp.addEventListener('input', () => {
            if(inp.value.toLowerCase() === 'roblox') {
                inp.value = 'now.gg/play/roblox';
            }
        });
    </script>
</body>
</html>
