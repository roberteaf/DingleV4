<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DingHub | System</title>
    <style>
        body { background: #000; color: #b3ff00; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { border: 1px solid #333; padding: 20px; border-radius: 12px; background: #050505; width: 80%; }
        .status { font-size: 10px; color: #666; margin-top: 10px; text-transform: uppercase; }
        #state { color: #ff453a; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin:0; letter-spacing:3px;">DINGHUB V4</h2>
        <div class="status">Engine Status: <span id="state">OFFLINE</span></div>
    </div>

    <script>
        /* This registers your sw.js the second the Hub opens */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(() => {
                    document.getElementById('state').innerText = 'ONLINE';
                    document.getElementById('state').style.color = '#b3ff00';
                })
                .catch(() => {
                    document.getElementById('state').innerText = 'REGISTRATION FAILED';
                });
        }
    </script>
</body>
</html>
