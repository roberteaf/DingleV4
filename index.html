<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DingleV4 | System Portal</title>
    <style>
        body { background: #000; color: #b3ff00; font-family: 'Courier New', monospace; 
               display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #333; padding: 30px; border-radius: 15px; text-align: center; background: #080808; }
        .blink { animation: blinker 1s linear infinite; font-size: 12px; color: #444; }
        @keyframes blinker { 50% { opacity: 0; } }
        h1 { margin: 0; font-size: 20px; letter-spacing: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>DINGLEV4</h1>
        <p id="status" style="color: #666; font-size: 11px;">INITIALIZING PROXY...</p>
        <div class="blink">SYSTEM_READY_V4.9</div>
    </div>

    <script>
        /* This script ACTIVATES your sw.js proxy */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(() => {
                    document.getElementById('status').innerText = 'PROXY ENGINE: ONLINE';
                    document.getElementById('status').style.color = '#b3ff00';
                });
        }
    </script>
</body>
</html>
