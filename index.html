<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DingleV4Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@200;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#010d1a;--foam:#22d3ee;--glint:#a5f3fc;--teal:#0891b2;--border:rgba(34,211,238,.2);--nav:64px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:'Outfit',sans-serif;color:var(--glint)}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#pts{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.p{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(165,243,252,.5),rgba(34,211,238,.04));animation:bu linear infinite;opacity:0}
@keyframes bu{0%{opacity:0;transform:translateY(0) translateX(0)}8%{opacity:1}85%{opacity:.28}100%{opacity:0;transform:translateY(-105vh) translateX(var(--dx))}}
.scan{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.022) 2px,rgba(0,0,0,.022) 4px)}

/* shell */
#app{position:relative;z-index:5;width:100%;height:100%;display:flex;flex-direction:column}

/* home */
#home{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav)+4px)}
#home::-webkit-scrollbar{width:3px}
#home::-webkit-scrollbar-thumb{background:rgba(34,211,238,.18);border-radius:4px}
.tab{display:none}.tab.active{display:block}

/* BROWSER VIEW - covers whole screen when active */
#bview{display:none;position:fixed;inset:0;z-index:300;flex-direction:column;background:#010d1a}
#bview.show{display:flex}
#bbar{display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(1,13,26,.99);border-bottom:1px solid rgba(34,211,238,.15);flex-shrink:0}
.bbtn{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.2);color:var(--foam);border-radius:7px;padding:5px 11px;font-size:.72rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;transition:background .15s;flex-shrink:0}
.bbtn:hover{background:rgba(34,211,238,.25)}
#burl{flex:1;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.5);border:1.5px solid rgba(34,211,238,.18);border-radius:9px;padding:5px 5px 5px 11px;min-width:0;transition:border-color .2s}
#burl:focus-within{border-color:var(--foam)}
#burlinput{flex:1;background:transparent;border:none;outline:none;color:var(--glint);font-size:.82rem;caret-color:var(--foam);font-family:'Outfit',sans-serif;min-width:0}
#burlinput::placeholder{color:rgba(165,243,252,.2)}
#burlgo{background:linear-gradient(135deg,#22d3ee,#0891b2);border:none;border-radius:6px;padding:5px 13px;color:#011725;font-size:.7rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
#bframe-wrap{flex:1;position:relative;overflow:hidden}
#bframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}
#bloader{position:absolute;inset:0;background:#010d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;transition:opacity .4s}
#bloader.gone{opacity:0;pointer-events:none}
.sp{width:32px;height:32px;border-radius:50%;border:2.5px solid rgba(34,211,238,.13);border-top-color:var(--foam);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldtx{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(34,211,238,.4)}

/* nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:50;height:var(--nav);background:rgba(1,13,26,.97);border-top:1px solid rgba(34,211,238,.14);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:space-around;padding:0 6px}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:10px;border:1.5px solid transparent;background:transparent;color:rgba(165,243,252,.3);cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;flex:1;user-select:none}
.nb span{font-size:.56rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.nb.on{border-color:rgba(34,211,238,.26);background:rgba(34,211,238,.08);color:var(--foam)}
.nb:hover{color:var(--glint);background:rgba(34,211,238,.04)}

/* search */
#shome{min-height:calc(100vh - var(--nav));display:flex;align-items:center;justify-content:center;padding:28px 16px}
.hub{width:min(520px,96vw);display:flex;flex-direction:column;align-items:center;animation:em .9s cubic-bezier(.16,1,.3,1) both}
@keyframes em{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(34,211,238,.18);animation:pr 3.2s ease-in-out infinite}
.r1{width:72px;height:72px}.r2{width:96px;height:96px;animation-delay:.7s;opacity:.5}.r3{width:120px;height:120px;animation-delay:1.4s;opacity:.22}
@keyframes pr{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.tri{position:relative;z-index:2;filter:drop-shadow(0 0 14px rgba(34,211,238,.6));animation:bob 4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.ltx{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:clamp(1.5rem,5vw,2rem);background:linear-gradient(135deg,#a5f3fc,#22d3ee,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(34,211,238,.38));margin-bottom:5px}
.lsb{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(34,211,238,.32);font-weight:200}
.card{width:100%;background:linear-gradient(145deg,rgba(5,48,79,.6),rgba(2,20,37,.88));border:1px solid var(--border);border-radius:20px;padding:24px 22px 20px;backdrop-filter:blur(28px);box-shadow:0 28px 68px rgba(1,13,26,.75)}
.sr{display:flex;align-items:center;gap:8px;background:rgba(1,13,26,.7);border:1.5px solid var(--border);border-radius:12px;padding:4px 4px 4px 14px;transition:border-color .3s,box-shadow .3s}
.sr:focus-within{border-color:var(--foam);box-shadow:0 0 0 3px rgba(34,211,238,.1)}
.sr input{flex:1;background:transparent;border:none;outline:none;color:var(--glint);font-size:.92rem;caret-color:var(--foam);font-family:'Outfit',sans-serif}
.sr input::placeholder{color:rgba(165,243,252,.17)}
.db{background:linear-gradient(135deg,#22d3ee,#0891b2);border:none;border-radius:8px;padding:9px 20px;color:#011725;font-size:.77rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:transform .18s,filter .18s;box-shadow:0 4px 14px rgba(34,211,238,.24);font-family:'Outfit',sans-serif;white-space:nowrap}
.db:hover{transform:scale(1.05);filter:brightness(1.12)}.db:active{transform:scale(.96)}
.str{margin-top:12px;font-size:.57rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(34,211,238,.17);display:flex;align-items:center;justify-content:center;gap:6px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--foam);box-shadow:0 0 6px var(--foam);animation:bl 2.2s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.14}}

/* shared */
.sh{padding:20px 16px 10px;display:flex;align-items:baseline;justify-content:space-between}
.st{font-family:'Cinzel Decorative',serif;font-size:.9rem;background:linear-gradient(135deg,#a5f3fc,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ss{font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(34,211,238,.24)}
.ts{margin:0 16px 14px;display:flex;align-items:center;gap:7px;background:rgba(1,13,26,.7);border:1.5px solid var(--border);border-radius:12px;padding:4px 4px 4px 13px;transition:border-color .3s}
.ts:focus-within{border-color:var(--foam);box-shadow:0 0 0 3px rgba(34,211,238,.09)}
.ts input{flex:1;background:transparent;border:none;outline:none;color:var(--glint);font-size:.85rem;caret-color:var(--foam);font-family:'Outfit',sans-serif}
.ts input::placeholder{color:rgba(165,243,252,.17)}
.ts button{background:linear-gradient(135deg,#22d3ee,#0891b2);border:none;border-radius:7px;padding:7px 14px;color:#011725;font-size:.7rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}
.divider{margin:2px 16px 14px;height:1px;background:linear-gradient(90deg,transparent,rgba(34,211,238,.12),transparent)}

/* movie grid */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;padding:0 16px 16px}
.mc{background:linear-gradient(145deg,rgba(5,48,79,.5),rgba(2,20,37,.8));border:1px solid rgba(34,211,238,.1);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.mc:hover{border-color:rgba(34,211,238,.5);transform:translateY(-3px);box-shadow:0 10px 30px rgba(1,13,26,.8)}
.mc:hover .play-icon{opacity:1}
.mc-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#021425}
.mc-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,rgba(5,48,79,.8),rgba(2,20,37,.9));display:flex;align-items:center;justify-content:center;font-size:2rem}
.play-icon{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);width:42px;height:42px;background:rgba(34,211,238,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none}
.mc-info{padding:8px 9px}
.mc-title{font-size:.72rem;font-weight:600;color:var(--glint);line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-year{font-size:.6rem;color:rgba(165,243,252,.32)}

/* games grid */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:0 16px 16px}
.gc{background:linear-gradient(145deg,rgba(5,48,79,.5),rgba(2,20,37,.8));border:1px solid rgba(34,211,238,.1);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.gc:hover{border-color:rgba(34,211,238,.5);transform:translateY(-3px);box-shadow:0 10px 30px rgba(1,13,26,.8)}
.gc:hover .play-icon{opacity:1}
.gc-ph{width:100%;aspect-ratio:16/10;background:linear-gradient(135deg,rgba(5,48,79,.8),rgba(2,20,37,.9));display:flex;align-items:center;justify-content:center;font-size:2rem}
.gc-info{padding:8px 9px}
.gc-name{font-size:.76rem;font-weight:600;color:var(--glint);margin-bottom:3px}
.gc-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.54rem;font-weight:600;text-transform:uppercase;background:rgba(34,211,238,.09);color:var(--foam);border:1px solid rgba(34,211,238,.15)}

.ld{display:flex;align-items:center;justify-content:center;gap:9px;padding:28px;color:rgba(34,211,238,.35);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .35s ease both}
.empty{padding:24px 16px;text-align:center;color:rgba(165,243,252,.28);font-size:.8rem}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="pts"></div>
<div class="scan"></div>

<div id="app">
  <div id="home">

    <!-- SEARCH -->
    <div class="tab active" id="tab-search">
      <div id="shome">
        <div class="hub">
          <div style="text-align:center;margin-bottom:24px">
            <div style="display:inline-flex;align-items:center;justify-content:center;position:relative;margin-bottom:12px">
              <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
              <svg class="tri" width="48" height="48" viewBox="0 0 54 54" fill="none">
                <circle cx="27" cy="27" r="25" fill="rgba(34,211,238,.07)" stroke="rgba(34,211,238,.28)" stroke-width="1.2"/>
                <line x1="27" y1="13" x2="27" y2="43" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round"/>
                <line x1="18" y1="13" x2="18" y2="25" stroke="#22d3ee" stroke-width="2.1" stroke-linecap="round"/>
                <line x1="36" y1="13" x2="36" y2="25" stroke="#22d3ee" stroke-width="2.1" stroke-linecap="round"/>
                <path d="M16 13 Q18 18 20 13" stroke="#a5f3fc" stroke-width="1.7" fill="none" stroke-linecap="round"/>
                <path d="M25 13 Q27 18 29 13" stroke="#a5f3fc" stroke-width="1.7" fill="none" stroke-linecap="round"/>
                <path d="M34 13 Q36 18 38 13" stroke="#a5f3fc" stroke-width="1.7" fill="none" stroke-linecap="round"/>
                <line x1="15" y1="29" x2="39" y2="29" stroke="rgba(34,211,238,.45)" stroke-width="1.3" stroke-linecap="round"/>
                <circle cx="27" cy="43" r="2.4" fill="none" stroke="#22d3ee" stroke-width="1.4"/>
              </svg>
            </div>
            <div class="ltx">DingleV4Hub</div>
            <div class="lsb">Ocean Edition &nbsp;·&nbsp; v4</div>
          </div>
          <div class="card">
            <div class="sr">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(34,211,238,.38)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input id="si" type="text" placeholder="Search or enter URL…" autocomplete="off" spellcheck="false"/>
              <button class="db" id="sgo">Dive</button>
            </div>
          </div>
          <div class="str"><div class="dot"></div>Loads inside · DuckDuckGo powered</div>
        </div>
      </div>
    </div>

    <!-- MOVIES -->
    <div class="tab" id="tab-movies">
      <div class="sh"><div class="st">🎬 Movies</div><div class="ss">Click to watch inside</div></div>
      <div class="ts">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(34,211,238,.38)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="mq" type="text" placeholder="Search a movie or show…" autocomplete="off" spellcheck="false"/>
        <button onclick="searchMovies()">Search</button>
      </div>
      <div id="mres"></div>
      <div class="divider"></div>
      <div class="sh" style="padding-top:4px"><div class="st" style="font-size:.82rem">🔥 Popular</div></div>
      <div class="mgrid" id="mpop"></div>
    </div>

    <!-- GAMES -->
    <div class="tab" id="tab-games">
      <div class="sh"><div class="st">🎮 Games</div><div class="ss">Click to play inside</div></div>
      <div class="ts">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(34,211,238,.38)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="gq" type="text" placeholder="Search games…" autocomplete="off" spellcheck="false"/>
        <button onclick="filterGames()">Search</button>
      </div>
      <div class="ggrid" id="ggrid"></div>
    </div>
  </div>

  <!-- BROWSER VIEW — full screen over everything -->
  <div id="bview">
    <div id="bbar">
      <button class="bbtn" onclick="goBack()">←</button>
      <button class="bbtn" onclick="goFwd()">→</button>
      <button class="bbtn" onclick="reloadFrame()">↺</button>
      <div id="burl">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(34,211,238,.35)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="burlinput" type="text" placeholder="Search or enter URL…" autocomplete="off" spellcheck="false"/>
        <button id="burlgo" onclick="navFromBar()">Go</button>
      </div>
      <button class="bbtn" onclick="toggleFS()">⛶</button>
      <button class="bbtn" onclick="closeBrowser()" style="background:rgba(255,60,60,.15);border-color:rgba(255,100,100,.2);color:#ff7070">✕</button>
    </div>
    <div id="bframe-wrap">
      <div id="bloader">
        <div class="sp"></div>
        <div class="ldtx">Loading…</div>
      </div>
      <iframe id="bframe"
        allow="fullscreen; autoplay; encrypted-media; picture-in-picture; accelerometer; gyroscope"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <nav id="nav">
    <button class="nb on" id="nb-search" onclick="sw('search')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </button>
    <button class="nb" id="nb-movies" onclick="sw('movies')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
      <span>Movies</span>
    </button>
    <button class="nb" id="nb-games" onclick="sw('games')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15" cy="13" r="1" fill="currentColor"/><circle cx="17" cy="11" r="1" fill="currentColor"/><rect x="2" y="6" width="20" height="12" rx="4"/></svg>
      <span>Games</span>
    </button>
  </nav>
</div>

<script>
// ── TABS ──
function sw(n){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on')});
  document.getElementById('tab-'+n).classList.add('active');
  document.getElementById('nb-'+n).classList.add('on');
  document.getElementById('home').scrollTop=0;
}

// ── BROWSER ──
var bframe = document.getElementById('bframe');
var bloader = document.getElementById('bloader');
var burlinput = document.getElementById('burlinput');

function openBrowser(url, label){
  bloader.classList.remove('gone');
  bframe.src = '';
  burlinput.value = url;
  document.getElementById('bview').classList.add('show');
  // small delay so browser paints the loader first
  setTimeout(function(){ bframe.src = url; }, 80);
}

bframe.addEventListener('load', function(){
  bloader.classList.add('gone');
  try{ burlinput.value = bframe.contentWindow.location.href; }catch(e){}
});

function closeBrowser(){
  document.getElementById('bview').classList.remove('show');
  bframe.src = 'about:blank';
  bloader.classList.remove('gone');
}

function goBack(){  try{ bframe.contentWindow.history.back(); }catch(e){} }
function goFwd(){   try{ bframe.contentWindow.history.forward(); }catch(e){} }
function reloadFrame(){ bframe.src = bframe.src; }
function toggleFS(){
  var w = document.getElementById('bframe-wrap');
  if(!document.fullscreenElement) w.requestFullscreen && w.requestFullscreen();
  else document.exitFullscreen && document.exitFullscreen();
}
function navFromBar(){
  var u = getURL(burlinput.value);
  if(u){ bloader.classList.remove('gone'); bframe.src = u; burlinput.value = u; }
}
burlinput.addEventListener('keydown', function(e){ if(e.key==='Enter') navFromBar(); });

// ── URL HELPER ──
function getURL(q){
  q = (q||'').trim(); if(!q) return null;
  if(/^https?:\/\//i.test(q)) return q;
  if(/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(q) && !q.includes(' ')) return 'https://'+q;
  return 'https://duckduckgo.com/?q='+encodeURIComponent(q)+'&ia=web';
}

// ── SEARCH ──
document.getElementById('sgo').onclick = function(){
  var u = getURL(document.getElementById('si').value);
  if(u) openBrowser(u);
};
document.getElementById('si').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ var u=getURL(this.value); if(u) openBrowser(u); }
});

// ── MOVIE CARD ──
function movieCard(title, year, poster, imdbId, i){
  var c = document.createElement('div');
  c.className = 'mc fu'; c.style.animationDelay = (i*0.04)+'s';
  var img = (poster && poster!=='N/A')
    ? '<img class="mc-img" src="'+poster+'" loading="lazy" onerror="this.outerHTML=\'<div class=mc-ph>🎬</div>\'">'
    : '<div class="mc-ph">🎬</div>';
  c.innerHTML = img
    + '<div class="play-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="#011725"><polygon points="5,3 19,12 5,21"/></svg></div>'
    + '<div class="mc-info"><div class="mc-title">'+title+'</div><div class="mc-year">'+(year||'')+'</div></div>';
  // try vidsrc first, fallback to ddg search
  c.onclick = function(){
    var url = imdbId
      ? 'https://vidsrc.xyz/embed/movie?imdb='+imdbId
      : 'https://duckduckgo.com/?q='+encodeURIComponent(title+' '+year+' watch free');
    openBrowser(url, title);
  };
  return c;
}

// ── MOVIE SEARCH ──
function searchMovies(){
  var q = document.getElementById('mq').value.trim(); if(!q) return;
  var res = document.getElementById('mres');

      } else {

      }
    }).catch(function(){
      res.innerHTML = '<div class="empty">Search failed</div>';

(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d'),W,H,t=0;
  function rsz(){W=c.width=innerWidth;H=c.height=innerHeight;}
  window.addEventListener('resize',rsz);rsz();
  (function draw(){
    t+=.006;ctx.clearRect(0,0,W,H);
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#010d1a');g.addColorStop(.6,'#021e35');g.addColorStop(1,'#033050');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    for(var i=0;i<5;i++){
      var x=W*(.08+i*.2+Math.sin(t*.9+i*1.3)*.05);
      var lg=ctx.createLinearGradient(x,0,x+50,H*.7);
      lg.addColorStop(0,'rgba(34,211,238,.04)');lg.addColorStop(1,'transparent');
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+70,H*.7);ctx.lineTo(x+40,H*.7);ctx.lineTo(x-20,0);
      ctx.fillStyle=lg;ctx.fill();
    }
    [[28,.004,0,.14,H*.72],[20,.007,1.8,.18,H*.79],[14,.011,3.5,.23,H*.85],[9,.017,1.1,.3,H*.91]].forEach(function(w){
      ctx.beginPath();ctx.moveTo(0,H);
      for(var x=0;x<=W;x+=5)ctx.lineTo(x,w[4]+Math.sin(x*w[1]+w[2]+t)*w[0]+Math.sin(x*w[1]*1.6+w[2]*1.4+t*1.3)*(w[0]*.35));
      ctx.lineTo(W,H);ctx.closePath();
      var wg=ctx.createLinearGradient(0,w[4]-w[0],0,H);
      wg.addColorStop(0,'rgba(8,145,178,'+w[3]+')');wg.addColorStop(1,'rgba(2,20,37,'+(w[3]*.5)+')');
      ctx.fillStyle=wg;ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();
