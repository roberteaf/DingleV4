<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINGLEV4 HUB</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #b3ff00;
            --surface: #111;
            --text: #fff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(179, 255, 0, 0.3);
        }

        span { color: var(--accent); }

        .search-box {
            background: var(--surface);
            padding: 8px;
            border-radius: 15px;
            display: flex;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 15px;
            font-size: 16px;
            outline: none;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .links {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .link-card {
            background: var(--surface);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #222;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
        }

        .link-card:hover {
            border-color: var(--accent);
            background: #1a1a1a;
        }

        .status {
            position: fixed;
            bottom: 20px;
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DINGLE<span>V4</span></h1>
        <p style="color: #666; margin-bottom: 30px;">Direct Proxy Gateway Active</p>

        <div class="search-box">
            <input type="text" id="urlInput" placeholder="Enter URL or Search Query..." autofocus>
            <button onclick="launch()">GO</button>
        </div>

        <div class="links">
            <div class="link-card" onclick="quickLaunch('https://google.com')">GOOGLE</div>
            <div class="link-card" onclick="quickLaunch('https://youtube.com')">YOUTUBE</div>
            <div class="link-card" onclick="quickLaunch('https://discord.com')">DISCORD</div>
            <div class="link-card" onclick="quickLaunch('https://poki.com')">POKI</div>
            <div class="link-card" onclick="quickLaunch('https://tiktok.com')">TIKTOK</div>
            <div class="link-card" onclick="quickLaunch('https://chess.com')">CHESS</div>
        </div>
    </div>

    <div class="status">System Status: Online</div>

    <script>
        /* This encodes the search so the school filter can't read the URL */
        function launch() {
            const val = document.getElementById('urlInput').value.trim();
            if(!val) return;
            
            let url;
            if (val.includes('.') && !val.includes(' ')) {
                url = val.startsWith('http') ? val : 'https://' + val;
            } else {
                url = "https://www.google.com/search?q=" + encodeURIComponent(val);
            }

            // Using a high-speed Ultraviolet backend for the actual unblocking
            window.location.href = "https://taco.sh/service/" + btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
        }

        function quickLaunch(url) {
            document.getElementById('urlInput').value = url;
            launch();
        }

        document.getElementById('urlInput').onkeypress = function(e) {
            if (e.key === 'Enter') launch();
        };
    </script>
</body>
</html>
