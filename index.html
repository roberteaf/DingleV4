<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nexus Chat · Public & Private Messaging</title>
  <!-- Google Fonts + modern styling -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #111217 0%, #0c0c12 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* main glass panel */
    .glass-panel {
      width: 1400px;
      max-width: 100%;
      height: 90vh;
      background: rgba(18, 20, 28, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* auth container */
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      background: rgba(12, 12, 18, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 2rem 2.2rem;
      width: 100%;
      max-width: 460px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 35px -10px black;
      transition: all 0.2s ease;
    }

    .tab-buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 0.75rem;
    }

    .tab-btn {
      background: transparent;
      border: none;
      font-size: 1.4rem;
      font-weight: 600;
      color: #8e8ea8;
      cursor: pointer;
      padding: 0.3rem 0;
      transition: 0.2s;
      letter-spacing: -0.2px;
    }

    .tab-btn.active {
      color: #c084fc;
      border-bottom: 2px solid #c084fc;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .auth-form input {
      background: #1e1f2c;
      border: 1px solid #2c2e3e;
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      color: #f0f0ff;
      font-weight: 500;
      outline: none;
      transition: 0.2s;
    }

    .auth-form input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 0 2px rgba(168,85,247,0.3);
    }

    .auth-form button {
      background: #7c3aed;
      border: none;
      padding: 0.9rem;
      border-radius: 1.5rem;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }

    .auth-form button:hover {
      background: #8b5cf6;
      transform: scale(0.98);
    }

    .error-msg {
      background: #ff3b6f20;
      color: #ff7b9c;
      padding: 0.6rem;
      border-radius: 1rem;
      font-size: 0.85rem;
      text-align: center;
    }

    /* main app layout (visible after login) */
    .app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      padding: 1rem 1.8rem;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .user-greeting {
      font-weight: 600;
      background: #2d2b3a;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.9rem;
      color: #ddd9ff;
    }

    .logout-btn {
      background: #2a2639;
      border: none;
      padding: 0.45rem 1.2rem;
      border-radius: 2rem;
      color: #f0eefc;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .logout-btn:hover {
      background: #c2410c;
      color: white;
    }

    .dashboard {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* users sidebar */
    .users-panel {
      width: 260px;
      background: rgba(10, 10, 16, 0.6);
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 1rem 0;
    }

    .users-panel h3 {
      padding: 0 1rem 0.8rem 1rem;
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: #aaa7d4;
      font-weight: 500;
    }

    .user-list {
      list-style: none;
    }

    .user-list li {
      padding: 0.65rem 1rem;
      margin: 0.2rem 0.6rem;
      border-radius: 1rem;
      cursor: pointer;
      transition: 0.1s;
      font-weight: 500;
      color: #dbdaff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-list li:hover {
      background: #2a2740;
    }

    .user-list li.active-dm {
      background: #4c3b7c;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* chat columns */
    .public-chat {
      flex: 1.4;
      display: flex;
      flex-direction: column;
      background: rgba(0,0,0,0.2);
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .dm-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(0,0,0,0.15);
    }

    .chat-header {
      padding: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-weight: 600;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(4px);
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .message-bubble {
      background: #1f1e2e;
      padding: 0.55rem 1rem;
      border-radius: 1.2rem;
      max-width: 85%;
      width: fit-content;
      word-break: break-word;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .message-bubble .sender {
      font-size: 0.7rem;
      font-weight: 700;
      color: #b4a9ff;
      margin-bottom: 0.2rem;
    }

    .message-bubble .text {
      color: #f0efff;
      font-size: 0.9rem;
    }

    .message-bubble .time {
      font-size: 0.6rem;
      color: #6e6a8f;
      text-align: right;
      margin-top: 0.2rem;
    }

    .my-message {
      align-self: flex-end;
      background: #5b3bc2;
    }
    .my-message .sender {
      color: #e2d6ff;
    }

    .chat-input-area {
      padding: 1rem;
      background: rgba(0,0,0,0.3);
      display: flex;
      gap: 0.6rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .chat-input-area input {
      flex: 1;
      background: #15161f;
      border: 1px solid #31314a;
      border-radius: 2rem;
      padding: 0.7rem 1rem;
      color: white;
      outline: none;
    }

    .chat-input-area button {
      background: #6d28d9;
      border: none;
      border-radius: 2rem;
      padding: 0 1.2rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }

    .empty-placeholder {
      color: #565277;
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #14141c;
    }
    ::-webkit-scrollbar-thumb {
      background: #4a4580;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="glass-panel" id="appRoot">
  <!-- AUTHENTICATION CONTAINER -->
  <div id="authContainer" class="auth-wrapper">
    <div class="auth-card">
      <div class="tab-buttons">
        <button class="tab-btn active" id="tabLoginBtn">🔐 Login</button>
        <button class="tab-btn" id="tabRegisterBtn">📝 Register</button>
      </div>
      <div id="loginForm" class="auth-form">
        <input type="text" id="loginUsername" placeholder="Username" autocomplete="username">
        <input type="password" id="loginPassword" placeholder="Password">
        <div id="loginError" class="error-msg" style="display: none;"></div>
        <button id="doLoginBtn">Login →</button>
      </div>
      <div id="registerForm" class="auth-form" style="display: none;">
        <input type="text" id="regUsername" placeholder="Choose username">
        <input type="password" id="regPassword" placeholder="Password">
        <div id="regError" class="error-msg" style="display: none;"></div>
        <button id="doRegisterBtn">Create account</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP (hidden until login) -->
  <div id="appContainer" class="app-main" style="display: none;">
    <div class="top-bar">
      <div class="user-greeting" id="currentUserDisplay">👤 Loading...</div>
      <button class="logout-btn" id="logoutBtn">✖ Logout</button>
    </div>
    <div class="dashboard">
      <!-- LEFT: Users list -->
      <div class="users-panel">
        <h3>📇 ALL MEMBERS</h3>
        <ul id="userList" class="user-list">
          <li style="justify-content:center; color:#777;">Fetching users...</li>
        </ul>
      </div>

      <!-- PUBLIC CHAT -->
      <div class="public-chat">
        <div class="chat-header">🌍 PUBLIC CHATROOM</div>
        <div id="publicMessagesArea" class="messages-area">
          <div class="empty-placeholder">✨ No messages yet. Start the conversation!</div>
        </div>
        <div class="chat-input-area">
          <input type="text" id="publicMsgInput" placeholder="Message to everyone...">
          <button id="sendPublicBtn">Send</button>
        </div>
      </div>

      <!-- DM CHAT -->
      <div class="dm-chat">
        <div class="chat-header" id="dmHeader">💬 DIRECT MESSAGE <span id="dmTargetName" style="color:#c084fc;">— select user —</span></div>
        <div id="dmMessagesArea" class="messages-area">
          <div class="empty-placeholder">👈 Click a username to start private chat</div>
        </div>
        <div class="chat-input-area">
          <input type="text" id="dmMsgInput" placeholder="Private message..." disabled>
          <button id="sendDmBtn" disabled>Send DM</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getDatabase, ref, set, push, onValue, off, serverTimestamp, get, child, update, query, orderByChild, limitToLast } from "firebase/database";

  // ================= FIREBASE CONFIG =================
  const firebaseConfig = {
    apiKey: "AIzaSyBJ8wf399dp0nxFYl8y7SoarcDUOiZ7Wow",
    authDomain: "chatappv2-b6bd8.firebaseapp.com",
    databaseURL: "https://chatappv2-b6bd8-default-rtdb.firebaseio.com",
    projectId: "chatappv2-b6bd8",
    storageBucket: "chatappv2-b6bd8.firebasestorage.app",
    messagingSenderId: "458480303979",
    appId: "1:458480303979:web:a3a83ed05856d23df6d62e",
    measurementId: "G-ZS3DQJS2HW"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ---------- Global state ----------
  let currentUser = null;          // { username }
  let currentDMUser = null;        // username for active DM conversation
  let publicMessagesRef = null;
  let dmMessagesRef = null;         // active listener ref for dm
  let userListRef = null;
  let publicListenerActive = null;
  let dmListenerActive = null;
  let userListListenerActive = null;

  // DOM elements
  const authContainer = document.getElementById('authContainer');
  const appContainer = document.getElementById('appContainer');
  const loginFormDiv = document.getElementById('loginForm');
  const registerFormDiv = document.getElementById('registerForm');
  const tabLogin = document.getElementById('tabLoginBtn');
  const tabRegister = document.getElementById('tabRegisterBtn');
  const loginErrorDiv = document.getElementById('loginError');
  const regErrorDiv = document.getElementById('regError');
  const userListEl = document.getElementById('userList');
  const publicMsgArea = document.getElementById('publicMessagesArea');
  const dmMsgArea = document.getElementById('dmMessagesArea');
  const publicMsgInput = document.getElementById('publicMsgInput');
  const sendPublicBtn = document.getElementById('sendPublicBtn');
  const dmMsgInput = document.getElementById('dmMsgInput');
  const sendDmBtn = document.getElementById('sendDmBtn');
  const dmTargetNameSpan = document.getElementById('dmTargetName');
  const currentUserDisplay = document.getElementById('currentUserDisplay');
  const logoutBtn = document.getElementById('logoutBtn');

  // Helper: hash password with SHA-256
  async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // Show error messages
  function showLoginError(msg) {
    loginErrorDiv.textContent = msg;
    loginErrorDiv.style.display = 'block';
    setTimeout(() => loginErrorDiv.style.display = 'none', 3000);
  }
  function showRegError(msg) {
    regErrorDiv.textContent = msg;
    regErrorDiv.style.display = 'block';
    setTimeout(() => regErrorDiv.style.display = 'none', 3000);
  }

  // =============== AUTH: REGISTER ===============
  async function registerUser(username, password) {
    if (!username || username.trim() === "") throw new Error("Username required");
    if (password.length < 3) throw new Error("Password min 3 chars");
    const cleanUser = username.trim().toLowerCase();
    const userRef = ref(db, `users/${cleanUser}`);
    const snapshot = await get(userRef);
    if (snapshot.exists()) throw new Error("Username already exists");
    const hashed = await hashPassword(password);
    await set(userRef, {
      passwordHash: hashed,
      createdAt: serverTimestamp(),
      username: cleanUser
    });
    return { success: true };
  }

  // =============== AUTH: LOGIN ===============
  async function loginUser(username, password) {
    const cleanUser = username.trim().toLowerCase();
    const userRef = ref(db, `users/${cleanUser}`);
    const snapshot = await get(userRef);
    if (!snapshot.exists()) throw new Error("User not found");
    const userData = snapshot.val();
    const hashedInput = await hashPassword(password);
    if (userData.passwordHash !== hashedInput) throw new Error("Wrong password");
    return { username: cleanUser };
  }

  // ---------- Clear all realtime listeners ----------
  function detachAllListeners() {
    if (publicListenerActive && publicMessagesRef) {
      off(publicMessagesRef);
      publicListenerActive = null;
    }
    if (dmListenerActive && dmMessagesRef) {
      off(dmMessagesRef);
      dmListenerActive = null;
    }
    if (userListListenerActive && userListRef) {
      off(userListRef);
      userListListenerActive = null;
    }
  }

  // ---------- Load public messages realtime ----------
  function loadPublicMessages() {
    if (!currentUser) return;
    publicMessagesRef = ref(db, 'publicMessages');
    // order by timestamp, limit last 100 for performance
    const messagesQuery = query(publicMessagesRef, orderByChild('timestamp'), limitToLast(100));
    
    publicListenerActive = onValue(messagesQuery, (snapshot) => {
      const messages = [];
      snapshot.forEach(childSnap => {
        messages.push({ id: childSnap.key, ...childSnap.val() });
      });
      // sort by timestamp ascending
      messages.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
      renderPublicMessages(messages);
    });
  }

  function renderPublicMessages(messages) {
    if (!publicMsgArea) return;
    if (!messages.length) {
      publicMsgArea.innerHTML = `<div class="empty-placeholder">💬 No public messages yet. Say hi!</div>`;
      return;
    }
    publicMsgArea.innerHTML = '';
    messages.forEach(msg => {
      const isOwn = (msg.sender === currentUser?.username);
      const bubble = document.createElement('div');
      bubble.className = `message-bubble ${isOwn ? 'my-message' : ''}`;
      const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'now';
      bubble.innerHTML = `
        <div class="sender">${escapeHtml(msg.sender)}</div>
        <div class="text">${escapeHtml(msg.text)}</div>
        <div class="time">${timeStr}</div>
      `;
      publicMsgArea.appendChild(bubble);
    });
    publicMsgArea.scrollTop = publicMsgArea.scrollHeight;
  }

  // send public message
  async function sendPublicMessage(text) {
    if (!text.trim()) return;
    if (!currentUser) return;
    const msgRef = push(ref(db, 'publicMessages'));
    await set(msgRef, {
      sender: currentUser.username,
      text: text.trim(),
      timestamp: serverTimestamp()
    });
    publicMsgInput.value = '';
  }

  // ---------- Load user list (all registered usernames) ----------
  function loadUserList() {
    if (!currentUser) return;
    userListRef = ref(db, 'users');
    userListListenerActive = onValue(userListRef, (snapshot) => {
      const users = [];
      snapshot.forEach(childSnap => {
        const username = childSnap.key;
        if (username !== currentUser.username) {
          users.push(username);
        }
      });
      users.sort((a,b) => a.localeCompare(b));
      renderUserList(users);
    });
  }

  function renderUserList(users) {
    if (!userListEl) return;
    if (users.length === 0) {
      userListEl.innerHTML = `<li style="justify-content:center; opacity:0.7;">No other users yet</li>`;
      return;
    }
    userListEl.innerHTML = '';
    users.forEach(user => {
      const li = document.createElement('li');
      li.textContent = user;
      li.classList.add('user-item');
      if (currentDMUser === user) li.classList.add('active-dm');
      li.addEventListener('click', () => {
        // open DM conversation with this user
        if (currentDMUser === user) return;
        currentDMUser = user;
        // re-render user list to highlight
        renderUserList(users);
        dmTargetNameSpan.textContent = `@${user}`;
        dmMsgInput.disabled = false;
        sendDmBtn.disabled = false;
        loadPrivateMessages(user);
      });
      userListEl.appendChild(li);
    });
  }

  // ---------- Private Messages (DM) ----------
  function getConversationId(userA, userB) {
    const sorted = [userA, userB].sort();
    return `${sorted[0]}_${sorted[1]}`;
  }

  async function loadPrivateMessages(otherUser) {
    if (!currentUser) return;
    // detach previous DM listener
    if (dmListenerActive && dmMessagesRef) {
      off(dmMessagesRef);
      dmListenerActive = null;
    }
    const convId = getConversationId(currentUser.username, otherUser);
    const dmPath = `privateMessages/${convId}/messages`;
    dmMessagesRef = ref(db, dmPath);
    const messagesQuery = query(dmMessagesRef, orderByChild('timestamp'), limitToLast(100));
    dmListenerActive = onValue(messagesQuery, (snapshot) => {
      const messages = [];
      snapshot.forEach(childSnap => {
        messages.push({ id: childSnap.key, ...childSnap.val() });
      });
      messages.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
      renderDMMessages(messages, otherUser);
    });
  }

  function renderDMMessages(messages, partner) {
    if (!dmMsgArea) return;
    if (!messages.length) {
      dmMsgArea.innerHTML = `<div class="empty-placeholder">🔒 No private messages yet. Send a whisper to @${escapeHtml(partner)}</div>`;
      return;
    }
    dmMsgArea.innerHTML = '';
    messages.forEach(msg => {
      const isOwn = (msg.from === currentUser?.username);
      const bubble = document.createElement('div');
      bubble.className = `message-bubble ${isOwn ? 'my-message' : ''}`;
      const senderDisplay = isOwn ? 'You' : msg.from;
      const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'now';
      bubble.innerHTML = `
        <div class="sender">${escapeHtml(senderDisplay)} → ${escapeHtml(msg.to === currentUser?.username ? 'me' : msg.to)}</div>
        <div class="text">${escapeHtml(msg.text)}</div>
        <div class="time">${timeStr}</div>
      `;
      dmMsgArea.appendChild(bubble);
    });
    dmMsgArea.scrollTop = dmMsgArea.scrollHeight;
  }

  async function sendPrivateMessage(toUser, text) {
    if (!text.trim()) return;
    if (!currentUser) return;
    if (toUser === currentUser.username) {
      alert("You cannot DM yourself");
      return;
    }
    const convId = getConversationId(currentUser.username, toUser);
    const dmMessagesRefPath = ref(db, `privateMessages/${convId}/messages`);
    await push(dmMessagesRefPath, {
      from: currentUser.username,
      to: toUser,
      text: text.trim(),
      timestamp: serverTimestamp()
    });
    dmMsgInput.value = '';
    // scroll will auto update via listener
  }

  // =============== LOGIN FLOW ===============
  async function handleLogin() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    try {
      const user = await loginUser(username, password);
      currentUser = { username: user.username };
      startAppAfterLogin();
    } catch (err) {
      showLoginError(err.message);
    }
  }

  async function handleRegister() {
    const username = document.getElementById('regUsername').value;
    const password = document.getElementById('regPassword').value;
    try {
      await registerUser(username, password);
      showRegError("✅ Account created! Please login.");
      // switch to login tab
      document.getElementById('loginUsername').value = username.trim().toLowerCase();
      document.getElementById('loginPassword').value = '';
      switchToLoginTab();
    } catch (err) {
      showRegError(err.message);
    }
  }

  function switchToLoginTab() {
    tabLogin.classList.add('active');
    tabRegister.classList.remove('active');
    loginFormDiv.style.display = 'flex';
    registerFormDiv.style.display = 'none';
  }
  function switchToRegisterTab() {
    tabRegister.classList.add('active');
    tabLogin.classList.remove('active');
    loginFormDiv.style.display = 'none';
    registerFormDiv.style.display = 'flex';
  }

  function startAppAfterLogin() {
    detachAllListeners();
    // hide auth, show app
    authContainer.style.display = 'none';
    appContainer.style.display = 'flex';
    currentUserDisplay.textContent = `👤 ${currentUser.username}`;
    // reset DM states
    currentDMUser = null;
    dmTargetNameSpan.textContent = '— select user —';
    dmMsgInput.disabled = true;
    sendDmBtn.disabled = true;
    dmMsgArea.innerHTML = `<div class="empty-placeholder">👈 Click a username to start private chat</div>`;
    
    // load all realtime data
    loadUserList();
    loadPublicMessages();
  }

  function logout() {
    detachAllListeners();
    currentUser = null;
    currentDMUser = null;
    publicMessagesRef = null;
    dmMessagesRef = null;
    authContainer.style.display = 'flex';
    appContainer.style.display = 'none';
    // clear input fields
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('regUsername').value = '';
    document.getElementById('regPassword').value = '';
    publicMsgInput.value = '';
    dmMsgInput.value = '';
  }

  // Helper: escape HTML to avoid injection
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // =============== EVENT LISTENERS ===============
  tabLogin.addEventListener('click', switchToLoginTab);
  tabRegister.addEventListener('click', switchToRegisterTab);
  document.getElementById('doLoginBtn').addEventListener('click', handleLogin);
  document.getElementById('doRegisterBtn').addEventListener('click', handleRegister);
  logoutBtn.addEventListener('click', logout);
  sendPublicBtn.addEventListener('click', () => sendPublicMessage(publicMsgInput.value));
  publicMsgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendPublicMessage(publicMsgInput.value); });
  sendDmBtn.addEventListener('click', () => {
    if (currentDMUser) sendPrivateMessage(currentDMUser, dmMsgInput.value);
    else alert("Select a user first");
  });
  dmMsgInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && currentDMUser) sendPrivateMessage(currentDMUser, dmMsgInput.value);
  });

  // initial UI: login form active
  switchToLoginTab();
  console.log("🔥 Firebase chat ready — public & DM system online");
</script>
</body>
</html>
