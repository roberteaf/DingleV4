<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DingleV4Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@200;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#010d1a;--foam:#22d3ee;--glint:#a5f3fc;--teal:#0891b2;--border:rgba(34,211,238,.2);--nav:64px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:'Outfit',sans-serif;color:var(--glint)}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#pts{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.p{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(165,243,252,.5),rgba(34,211,238,.04));animation:bu linear infinite;opacity:0}
@keyframes bu{0%{opacity:0;transform:translateY(0) translateX(0)}8%{opacity:1}85%{opacity:.28}100%{opacity:0;transform:translateY(-105vh) translateX(var(--dx))}}
.scan{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.022) 2px,rgba(0,0,0,.022) 4px)}

/* shell */
#app{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column}

/* home pages */
#home{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav) + 4px)}
#home::-webkit-scrollbar{width:3px}
#home::-webkit-scrollbar-thumb{background:rgba(34,211,238,.18);border-radius:4px}
.tab{display:none}.tab.active{display:block}

/* browser */
#browser{display:none;flex-direction:column;flex:1}
#browser.show{display:flex}
#topbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(1,13,26,.98);border-bottom:1px solid rgba(34,211,238,.14);flex-shrink:0}
.tbtn{background:rgba(34,211,238,.09);border:1px solid rgba(34,211,238,.18);color:var(--foam);border-radius:7px;padding:5px 10px;font-size:.7rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;transition:background .15s;flex-shrink:0}
.tbtn:hover{background:rgba(34,211,238,.2)}
#urlbar{flex:1;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.45);border:1.5px solid rgba(34,211,238,.16);border-radius:8px;padding:4px 4px 4px 10px;min-width:0;transition:border-color .2s}
#urlbar:focus-within{border-color:var(--foam)}
#urlinput{flex:1;background:transparent;border:none;outline:none;color:var(--glint);font-size:.8rem;caret-color:var(--foam);font-family:'Outfit',sans-serif;min-width:0}
#urlinput::placeholder{color:rgba(165,243,252,.18)}
#urlgo{background:linear-gradient(135deg,#22d3ee,#0891b2);border:none;border-radius:6px;padding:5px 12px;color:#011725;font-size:.7rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;flex-shrink:0}
#fw{flex:1;position:relative;background:#010d1a}
#frame{width:100%;height:100%;border:none;display:block;background:#fff}
#loader{position:absolute;inset:0;background:#010d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:5;transition:opacity .3s;pointer-events:none}
#loader.gone{opacity:0}
.sp{width:30px;height:30px;border-radius:50%;border:2.5px solid rgba(34,211,238,.13);border-top-color:var(--foam);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldtx{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(34,211,238,.38)}

/* bottom nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--nav);background:rgba(1,13,26,.97);border-top:1px solid rgba(34,211,238,.14);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:space-around;padding:0 6px}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:10px;border:1.5px solid transparent;background:transparent;color:rgba(165,243,252,.3);cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;flex:1}
.nb span{font-size:.56rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.nb.on{border-color:rgba(34,211,238,.26);background:rgba(34,211,238,.08);color:var(--foam)}
.nb.on svg{filter:drop-shadow(0 0 4px rgba(34,211,238,.5))}
.nb:hover{color:var(--glint);background:rgba(34,211,238,.04)}

/* search tab */
#shome{min-height:calc(100vh - var(--nav));display:flex;align-items:center;justify-content:center;padding:28px 16px}
.hub{width:min(520px,96vw);display:flex;flex-direction:column;align-items:center;animation:em .9s cubic-bezier(.16,1,.3,1) both}
@keyframes em{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(34,211,238,.18);animation:pr 3.2s ease-in-out infinite}
.r1{width:72px;height:72px}.r2{width:96px;height:96px;animation-delay:.7s;opacity:.5}.r3{width:120px;height:120px;animation-delay:1.4s;opacity:.22}
@keyframes pr{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.tri{position:relative;z-index:2;filter:drop-shadow(0 0 14px rgba(34,211,238,.6));animation:bob 4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.ltx{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:clamp(1.5rem,5vw,2rem);background:linear-gradient(135deg,#a5f3fc,#22d3ee,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(34,211,238,.38));margin-bottom:5px}
.lsb{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(34,211,238,.32);font-weight:200}
.card{width:100%;background:linear-gradient(145deg,rgba(5,48,79,.6),rgba(2,20,37,.88));border:1px solid var(--border);border-radius:20px;padding:24px 22px 20px;backdrop-filter:blur(28px);box-shadow:0 28px 68px rgba(1,13,26,.75)}
.er{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.et{padding:5px 11px;border-radius:8px;border:1.5px solid rgba(34,211,238,.17);background:rgba(1,13,26,.5);color:rgba(165,243,252,.42);font-size:.7rem;font-weight:500;cursor:pointer;user-select:none;transition:all .2s;white-space:nowrap;font-family:'Outfit',sans-serif}
.et:hover{border-color:rgba(34,211,238,.42);color:var(--glint);background:rgba(34,211,238,.07)}
.et.on{border-color:var(--foam);background:rgba(34,211,238,.13);color:var(--foam)}
.sr{display:flex;align-items:center;gap:8px;background:rgba(1,13,26,.7);border:1.5px solid var(--border);border-radius:12px;padding:4px 4px 4px 14px;transition:border-color .3s,box-shadow .3s}
.sr:focus-within{border-color:var(--foam);box-shadow:0 0 0 3px rgba(34,211,238,.1)}
.sr input{flex:1;background:transparent;border:none;outline:none;color:var(--glint);font-size:.92rem;caret-color:var(--foam);font-family:'Outfit',sans-serif}
.sr input::placeholder{color:rgba(165,243,252,.17)}
.db{background:linear-gradient(135deg,#22d3ee,#0891b2);border:none;border-radius:8px;padding:9px 20px;color:#011725;font-size:.77rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:transform .18s,filter .18s;box-shadow:0 4px 14px rgba(34,211,238,.24);font-family:'Outfit',sans-serif;white-space:nowrap}
.db:hover{transform:scale(1.05);filter:brightness(1.12)}.db:active{transform:scale(.96)}
.str{margin-top:12px;font-size:.57rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(34,211,238,.17);display:flex;align-items:center;justify-content:center;gap:6px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--foam);box-shadow:0 0 6px var(--foam);animation:bl 2.2s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.14}}

/* shared tab styles */
.sh{padding:20px 16px 10px;display:flex;align-items:baseline;justify-content:space-between}
.st{font-family:'Cinzel Decorative',serif;font-size:.9rem;background:linear-gradient(135deg,#a5f3fc,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ss{font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(34,211,238,.24)}
.ts{margin:0 16px 14px;display:flex;align-items:center;gap:7px;background:rgba(1,13,26,.7);border:1.5px solid var(--border);border-radius:12px;padding:4px 4px 4px 13px;transition:border-color .3s}
.ts:focus-within{border-color:var(--foam);box-shadow:0 0 0 3px rgba(34,211,238,.09)}
.ts input{flex:1;background:transparent;border:none;outline:none;color:var(--glint);font-size:.85rem;caret-color:var(--foam);font-family:'Outfit',sans-serif}
.ts input::placeholder{color:rgba(165,243,252,.17)}
.ts button{background:linear-gradient(135deg,#22d3ee,#0891b2);border:none;border-radius:7px;padding:7px 14px;color:#011725;font-size:.7rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(144px,1fr));gap:8px;padding:0 16px 14px}
.gc{background:linear-gradient(145deg,rgba(5,48,79,.5),rgba(2,20,37,.8));border:1px solid rgba(34,211,238,.1);border-radius:12px;padding:13px 11px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:6px}
.gc:hover{border-color:rgba(34,211,238,.36);background:rgba(34,211,238,.06);transform:translateY(-2px);box-shadow:0 8px 24px rgba(1,13,26,.6)}
.gi{font-size:1.3rem;line-height:1}.gn{font-size:.76rem;font-weight:600;color:var(--glint)}.gd{font-size:.64rem;color:rgba(165,243,252,.32);line-height:1.4}
.gtag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.54rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;background:rgba(34,211,238,.09);color:var(--foam);border:1px solid rgba(34,211,238,.15);width:fit-content}
.divider{margin:2px 16px 14px;height:1px;background:linear-gradient(90deg,transparent,rgba(34,211,238,.12),transparent)}
.mr{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;padding:0 16px 14px}
.mc{background:linear-gradient(145deg,rgba(5,48,79,.5),rgba(2,20,37,.8));border:1px solid rgba(34,211,238,.1);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.mc:hover{border-color:rgba(34,211,238,.34);transform:translateY(-2px);box-shadow:0 10px 30px rgba(1,13,26,.7)}
.mp{width:100%;aspect-ratio:2/3;object-fit:cover}.mph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,rgba(5,48,79,.8),rgba(2,20,37,.9));display:flex;align-items:center;justify-content:center;font-size:1.9rem}
.mi2{padding:8px}.mt2{font-size:.74rem;font-weight:600;color:var(--glint);margin-bottom:2px;line-height:1.3}.mm2{font-size:.6rem;color:rgba(165,243,252,.32)}
.mbs{display:flex;gap:4px;padding:0 8px 8px;flex-wrap:wrap}
.mb{flex:1;padding:5px 4px;border-radius:6px;border:1px solid rgba(34,211,238,.16);background:rgba(34,211,238,.07);color:var(--foam);font-size:.58rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;text-align:center;transition:all .18s;white-space:nowrap}
.mb:hover{background:rgba(34,211,238,.17);border-color:var(--foam)}
.mb.pri{background:linear-gradient(135deg,#22d3ee,#0891b2);color:#011725;border-color:transparent}
.ld2{display:flex;align-items:center;justify-content:center;gap:9px;padding:28px;color:rgba(34,211,238,.35);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .35s ease both}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="pts"></div>
<div class="scan"></div>

<div id="app">
  <div id="home">

    <!-- SEARCH -->
    <div class="tab active" id="tab-search">
      <div id="shome">
        <div class="hub">
          <div style="text-align:center;margin-bottom:24px">
            <div style="display:inline-flex;align-items:center;justify-content:center;position:relative;margin-bottom:12px">
              <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
              <svg class="tri" width="48" height="48" viewBox="0 0 54 54" fill="none">
                <circle cx="27" cy="27" r="25" fill="rgba(34,211,238,.07)" stroke="rgba(34,211,238,.28)" stroke-width="1.2"/>
                <line x1="27" y1="13" x2="27" y2="43" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round"/>
                <line x1="18" y1="13" x2="18" y2="25" stroke="#22d3ee" stroke-width="2.1" stroke-linecap="round"/>
                <line x1="36" y1="13" x2="36" y2="25" stroke="#22d3ee" stroke-width="2.1" stroke-linecap="round"/>
                <path d="M16 13 Q18 18 20 13" stroke="#a5f3fc" stroke-width="1.7" fill="none" stroke-linecap="round"/>
                <path d="M25 13 Q27 18 29 13" stroke="#a5f3fc" stroke-width="1.7" fill="none" stroke-linecap="round"/>
                <path d="M34 13 Q36 18 38 13" stroke="#a5f3fc" stroke-width="1.7" fill="none" stroke-linecap="round"/>
                <line x1="15" y1="29" x2="39" y2="29" stroke="rgba(34,211,238,.45)" stroke-width="1.3" stroke-linecap="round"/>
                <circle cx="27" cy="43" r="2.4" fill="none" stroke="#22d3ee" stroke-width="1.4"/>
              </svg>
            </div>
            <div class="ltx">DingleV4Hub</div>
            <div class="lsb">Ocean Edition &nbsp;·&nbsp; v4</div>
          </div>
          <div class="card">
            <div class="er" id="er"></div>
            <div class="sr">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(34,211,238,.38)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input id="si" type="text" placeholder="Search or enter a URL…" autocomplete="off" spellcheck="false"/>
              <button class="db" id="sgo">Dive</button>
            </div>
          </div>
          <div class="str"><div class="dot"></div>Loads right here · no history</div>
        </div>
      </div>
    </div>

    <!-- MOVIES -->
    <div class="tab" id="tab-movies">
      <div class="sh"><div class="st">🎬 Movies</div><div class="ss">Free streaming</div></div>
      <div class="ts">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(34,211,238,.38)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="mq" type="text" placeholder="Search a movie or show…" autocomplete="off" spellcheck="false"/>
        <button onclick="searchMovies()">Search</button>
      </div>
      <div id="mres"></div>
      <div class="divider"></div>
      <div class="sh" style="padding-top:6px"><div class="st" style="font-size:.8rem">🌐 Streaming Sites</div></div>
      <div class="grid" id="msites"></div>
    </div>

    <!-- GAMES -->
    <div class="tab" id="tab-games">
      <div class="sh"><div class="st">🎮 Games</div><div class="ss">Browser games</div></div>
      <div class="ts">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(34,211,238,.38)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="gq" type="text" placeholder="Search games…" autocomplete="off" spellcheck="false"/>
        <button onclick="filterGames()">Search</button>
      </div>
      <div class="sh" style="padding-top:2px"><div class="st" style="font-size:.8rem">🕹️ Game Sites</div></div>
      <div class="grid" id="gsites"></div>
      <div class="divider"></div>
      <div class="sh" style="padding-top:2px"><div class="st" style="font-size:.8rem">⭐ Popular Games</div></div>
      <div class="grid" id="ggrid"></div>
    </div>
  </div>

  <!-- BROWSER -->
  <div id="browser">
    <div id="topbar">
      <button class="tbtn" onclick="bk()">←</button>
      <button class="tbtn" onclick="fw()">→</button>
      <button class="tbtn" onclick="rl()">↺</button>
      <div id="urlbar">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(34,211,238,.35)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="urlinput" type="text" placeholder="Search or URL…" autocomplete="off" spellcheck="false"/>
        <button id="urlgo" onclick="navBar()">Go</button>
      </div>
      <button class="tbtn" onclick="tfs()" title="Fullscreen">⛶</button>
      <button class="tbtn" onclick="goHome()" style="background:rgba(255,70,70,.12);border-color:rgba(255,100,100,.18);color:#ff7070">✕</button>
    </div>
    <div id="fw">
      <div id="loader"><div class="sp"></div><div class="ldtx">Diving in…</div></div>
      <iframe id="frame" allowfullscreen allow="fullscreen; autoplay; encrypted-media; picture-in-picture" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-presentation"></iframe>
    </div>
  </div>

  <nav id="nav">
    <button class="nb on" id="nb-search" onclick="sw('search')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </button>
    <button class="nb" id="nb-movies" onclick="sw('movies')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
      <span>Movies</span>
    </button>
    <button class="nb" id="nb-games" onclick="sw('games')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15" cy="13" r="1" fill="currentColor"/><circle cx="17" cy="11" r="1" fill="currentColor"/><rect x="2" y="6" width="20" height="12" rx="4"/></svg>
      <span>Games</span>
    </button>
  </nav>
</div>

<script>
// tab switch
function sw(n){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+n).classList.add('active');
  document.getElementById('nb-'+n).classList.add('on');
  document.getElementById('home').scrollTop=0;
}

// load url in iframe
function load(url){
  document.getElementById('home').style.display='none';
  document.getElementById('browser').classList.add('show');
  var fr=document.getElementById('frame');
  var ld=document.getElementById('loader');
  ld.classList.remove('gone');
  fr.src='about:blank';
  document.getElementById('urlinput').value=url;
  setTimeout(()=>{fr.src=url},40);
  fr.onload=()=>{
    ld.classList.add('gone');
    try{var h=fr.contentWindow.location.href;if(h&&h!=='about:blank')document.getElementById('urlinput').value=h}catch(e){}
  };
}

function goHome(){
  document.getElementById('frame').src='about:blank';
  document.getElementById('browser').classList.remove('show');
  document.getElementById('home').style.display='';
}
function bk(){try{document.getElementById('frame').contentWindow.history.back()}catch(e){}}
function fw(){try{document.getElementById('frame').contentWindow.history.forward()}catch(e){}}
function rl(){var f=document.getElementById('frame');try{f.contentWindow.location.reload()}catch(e){f.src=f.src}}
function tfs(){var fw=document.getElementById('fw');if(!document.fullscreenElement){fw.requestFullscreen&&fw.requestFullscreen()}else{document.exitFullscreen&&document.exitFullscreen()}}
function navBar(){var u=getURL(document.getElementById('urlinput').value);if(u)load(u)}
document.getElementById('urlinput').addEventListener('keydown',e=>{if(e.key==='Enter')navBar()});

// engines
var ae='google';
var EN={
  google:q=>'https://www.google.com/search?q='+encodeURIComponent(q),
  ddg:   q=>'https://duckduckgo.com/?q='+encodeURIComponent(q),
  brave: q=>'https://search.brave.com/search?q='+encodeURIComponent(q),
  bing:  q=>'https://www.bing.com/search?q='+encodeURIComponent(q),
  yt:    q=>'https://www.youtube.com/results?search_query='+encodeURIComponent(q),
  wiki:  q=>'https://en.wikipedia.org/w/index.php?search='+encodeURIComponent(q),
};
var EL={google:'🔍 Google',ddg:'🦆 DDG',brave:'🦁 Brave',bing:'Ⓑ Bing',yt:'▶ YT',wiki:'📖 Wiki'};
var er=document.getElementById('er');
Object.keys(EN).forEach(k=>{
  var b=document.createElement('div');b.className='et'+(k==='google'?' on':'');b.textContent=EL[k];
  b.onclick=()=>{ae=k;er.querySelectorAll('.et').forEach(x=>x.classList.remove('on'));b.classList.add('on')};
  er.appendChild(b);
});
function getURL(q){
  q=(q||'').trim();if(!q)return null;
  if(/^https?:\/\//i.test(q))return q;
  if(/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(q)&&!q.includes(' '))return'https://'+q;
  return EN[ae](q);
}
document.getElementById('sgo').onclick=()=>{var u=getURL(document.getElementById('si').value);if(u)load(u)};
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter'){var u=getURL(e.target.value);if(u)load(u)}});

// movie search
function searchMovies(){
  var q=document.getElementById('mq').value.trim();if(!q)return;
  var res=document.getElementById('mres');
  res.innerHTML='<div class="ld2"><div class="sp"></div>Searching…</div>';
  fetch('https://www.omdbapi.com/?s='+encodeURIComponent(q)+'&apikey=trilogy')
    .then(r=>r.json())
    .then(data=>{
      res.innerHTML='';
      if(data.Search&&data.Search.length){
        var h=document.createElement('div');
        h.style.cssText='padding:0 16px 8px;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(34,211,238,.28)';
        h.textContent='Results for "'+q+'"';
        res.appendChild(h);
        var g=document.createElement('div');g.className='mr';
        data.Search.slice(0,9).forEach((m,i)=>{
          var card=document.createElement('div');card.className='mc fu';card.style.animationDelay=(i*.05)+'s';
          var sq=encodeURIComponent(m.Title+' '+m.Year+' watch free');
          var poster=m.Poster&&m.Poster!=='N/A'
            ?`<img class="mp" src="${m.Poster}" loading="lazy" onerror="this.outerHTML='<div class=mph>🎬</div>'">`
            :`<div class="mph">🎬</div>`;
          card.innerHTML=`${poster}
            <div class="mi2"><div class="mt2">${m.Title}</div><div class="mm2">${m.Year} · ${m.Type}</div></div>
            <div class="mbs">
              <div class="mb pri" onclick="load('https://www.google.com/search?q=${sq}')">🔍 Find</div>
              <div class="mb" onclick="load('https://tubitv.com/search/${encodeURIComponent(m.Title)}')">Tubi</div>
              <div class="mb" onclick="load('https://moviesjoy.plus/search/${encodeURIComponent(m.Title)}')">Joy</div>
            </div>`;
          g.appendChild(card);
        });
        res.appendChild(g);
      } else fallback(q,res);
    }).catch(()=>fallback(document.getElementById('mq').value.trim(),document.getElementById('mres')));
}
function fallback(q,res){
  res.innerHTML=`<div style="padding:0 16px 14px"><div style="background:rgba(5,48,79,.4);border:1px solid rgba(34,211,238,.12);border-radius:12px;padding:14px">
    <div style="font-size:.7rem;color:rgba(165,243,252,.42);margin-bottom:10px">Find "<b style="color:var(--glint)">${q}</b>" free on:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      <div class="mb pri" style="flex:none;padding:7px 12px" onclick="load('https://www.google.com/search?q=${encodeURIComponent(q+' free stream')}')">🔍 Google</div>
      <div class="mb" style="flex:none;padding:7px 12px" onclick="load('https://tubitv.com/search/${encodeURIComponent(q)}')">📺 Tubi</div>
      <div class="mb" style="flex:none;padding:7px 12px" onclick="load('https://moviesjoy.plus/search/${encodeURIComponent(q)}')">😊 MoviesJoy</div>
      <div class="mb" style="flex:none;padding:7px 12px" onclick="load('https://pluto.tv/search#${encodeURIComponent(q)}')">🛸 Pluto</div>
    </div>
  </div></div>`;
}

function renderG(list){

function filterGames(){
  var q=document.getElementById('gq').value.trim().toLowerCase();

  renderG(AG.filter(g=>g.n.toLowerCase().includes(q)||g.t.toLowerCase().includes(q)||g.d.toLowerCase().includes(q)));
}

// ocean canvas
(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d'),W,H,t=0;
  function rsz(){W=c.width=innerWidth;H=c.height=innerHeight}
  window.addEventListener('resize',rsz);rsz();
  (function draw(){
    t+=.006;ctx.clearRect(0,0,W,H);
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#010d1a');g.addColorStop(.6,'#021e35');g.addColorStop(1,'#033050');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    for(var i=0;i<5;i++){
      var x=W*(.08+i*.2+Math.sin(t*.9+i*1.3)*.05);
      var lg=ctx.createLinearGradient(x,0,x+50,H*.7);
      lg.addColorStop(0,'rgba(34,211,238,.04)');lg.addColorStop(1,'transparent');
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+70,H*.7);ctx.lineTo(x+40,H*.7);ctx.lineTo(x-20,0);
      ctx.fillStyle=lg;ctx.fill();
    }
    [[28,.004,0,.14,H*.72],[20,.007,1.8,.18,H*.79],[14,.011,3.5,.23,H*.85],[9,.017,1.1,.3,H*.91]].forEach(w=>{
      ctx.beginPath();ctx.moveTo(0,H);
      for(var x=0;x<=W;x+=5)ctx.lineTo(x,w[4]+Math.sin(x*w[1]+w[2]+t)*w[0]+Math.sin(x*w[1]*1.6+w[2]*1.4+t*1.3)*(w[0]*.35));
      ctx.lineTo(W,H);ctx.closePath();
      var wg=ctx.createLinearGradient(0,w[4]-w[0],0,H);
      wg.addColorStop(0,'rgba(8,145,178,'+w[3]+')');wg.addColorStop(1,'rgba(2,20,37,'+(w[3]*.5)+')');
      ctx.fillStyle=wg;ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();
