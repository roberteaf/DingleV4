<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DingHub V4 | System</title>
    <style>
        body { background: #000; color: #b3ff00; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
               display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .status-card { border: 1px solid #222; padding: 30px; border-radius: 15px; text-align: center; background: #050505; 
                       box-shadow: 0 0 40px rgba(179, 255, 0, 0.05); }
        h1 { font-size: 22px; letter-spacing: 2px; margin: 0 0 10px 0; font-weight: 900; }
        .indicator { display: inline-block; width: 10px; height: 10px; background: #b3ff00; border-radius: 50%; 
                     margin-right: 8px; box-shadow: 0 0 10px #b3ff00; }
        p { color: #555; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        #sw-status { color: #b3ff00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="status-card">
        <h1>DINGHUB<span style="color:#fff">V4</span></h1>
        <p><span class="indicator"></span> SERVER: <span id="sw-status">INITIALIZING...</span></p>
    </div>

    <script>
        /* This script wakes up your sw.js so the 404 error disappears */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => {
                        document.getElementById('sw-status').innerText = 'ONLINE';
                        console.log('DingHub Engine Active');
                    })
                    .catch(err => {
                        document.getElementById('sw-status').innerText = 'ERROR';
                        document.getElementById('sw-status').style.color = '#ff453a';
                    });
            });
        }
    </script>
</body>
</html>
